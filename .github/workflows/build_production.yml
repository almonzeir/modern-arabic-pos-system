
name: Build Arabic POS Production Installer v3

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Dependencies
      run: flutter pub get

    - name: Build Windows Release
      run: flutter build windows --release --obfuscate --split-debug-info=build/debug_info

    - name: Create MSIX Installer
      # Added --no-install-certificate to the command line to force it to be non-interactive
      run: dart run msix:create --no-install-certificate

    - name: Create EXE Zip Fallback
      run: |
        powershell Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\Arabic-POS-Portable.zip

    - name: Upload Installer Files
      uses: actions/upload-artifact@v4
      with:
        name: Arabic-POS-Production-Files
        path: |
          build\windows\x64\runner\Release\*.msix
          build\Arabic-POS-Portable.zip
