
name: Build Arabic POS Production Final

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Dependencies
      run: flutter pub get

    - name: Build Windows Release
      run: flutter build windows --release

    - name: Create MSIX Installer
      # Removed the broken flag. Added continue-on-error so the ZIP build always runs.
      continue-on-error: true
      run: dart run msix:create

    - name: Create EXE Zip Fallback
      run: |
        powershell Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\Arabic-POS-Portable.zip

    - name: Upload Production Files
      uses: actions/upload-artifact@v4
      with:
        name: Arabic-POS-Final-Release
        path: |
          build\windows\x64\runner\Release\*.msix
          build\Arabic-POS-Portable.zip
